<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="t1" x1="0" y1="0" x2="192" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- Three interwoven thread arcs -->
  <path d="M48 140 C48 80, 80 52, 130 52" stroke="white" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M62 148 C62 84, 90 42, 144 42" stroke="rgba(255,255,255,0.5)" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M36 132 C36 78, 72 62, 118 62" stroke="rgba(255,255,255,0.25)" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Thread endpoints -->
  <circle cx="130" cy="52" r="8" fill="white"/>
  <circle cx="144" cy="42" r="6" fill="rgba(255,255,255,0.5)"/>
  <circle cx="118" cy="62" r="5" fill="rgba(255,255,255,0.25)"/>
</svg>
