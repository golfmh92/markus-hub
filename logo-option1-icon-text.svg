<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- Woven threads icon -->
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <!-- Three interwoven arcs -->
  <path d="M12 56 C12 28, 32 16, 52 16" stroke="url(#g1)" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M22 64 C22 32, 40 12, 60 12" stroke="url(#g2)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M4 48 C4 24, 28 20, 46 20" stroke="url(#g1)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Connecting dots -->
  <circle cx="52" cy="16" r="4" fill="url(#g1)"/>
  <circle cx="60" cy="12" r="3.5" fill="url(#g2)" opacity="0.7"/>
  <circle cx="46" cy="20" r="3" fill="url(#g1)" opacity="0.4"/>
  <!-- Text: Loom -->
  <text x="78" y="56" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="46" font-weight="800" letter-spacing="-2" fill="url(#g1)">Loom</text>
</svg>
